# Baseline registry — where each baseline's recons live and how they were produced.
# These results were generated by the fairness audit (DAPS-aligned, proper center-crop)
# and are symlinked under results/baselines/. compare_baselines.py reads the canonical
# metric CSV (results/metrics/previous_baseline_metric_comparison.csv); this file
# documents provenance + path patterns for release migration and re-evaluation.
#
# IMPORTANT caveats (from the audit — do NOT present naively):
#   - PSLD / ReSample use an FFHQ-256 FACE LDM prior on ImageNet -> OOD, not prior-matched.
#   - DDNM-gaussian required the DDNM+ fix (noise-aware, ZERO=0.25) to work at all.
#   - DDNM/DDRM/DiffPIR ran at ~2x noise; DPS/FPS saved min-max-normalized recons.
#   - Each method is scored against ITS OWN target GT (one metric stack, piq + official LPIPS).

# task-slug naming differs per baseline family; mapping from canonical task -> each family's slug:
task_slugs:
  superresolution:   {daps: superresolution, svd: superresolution_x4,        face: superresolution}
  gaussian_blur:     {daps: gaussian_deblur, svd: gaussian_blur_k61_sigma3,  face: gaussian_deblur}
  motion_blur:       {daps: motion_deblur,   svd: motion_blur_k61_sigma0.5,  face: motion_deblur}
  box_inpainting:    {daps: box_inpainting,  svd: box_inpainting_center_128, face: box_inpainting}
  random_inpainting: {daps: random_inpainting, svd: random_inpainting_0.7,   face: random_inpainting}

baselines:
  daps_pixel:
    dir: results/baselines/daps_pixel
    slug_family: daps
    recon_pattern: "{slug}/{inner}/samples/{i:05d}_run0000.png"   # inner = single subdir
    note: DAPS-100 reference; reproduces the paper Table 3 within +-0.2..1.1 dB. UNCONDITIONAL model.
  ddnm:
    dir: results/baselines/ddnm
    slug_family: svd
    recon_pattern: "{slug}/recon/{i:05d}.png"
    note: gaussian fixed via DDNM+ (1D Deblurring + ZERO=0.25). No motion (non-separable).
  ddrm:
    dir: results/baselines/ddrm
    slug_family: svd
    recon_pattern: "{slug}/recon/{i:05d}.png"
    note: strongest SVD baseline on SR; no motion (non-separable kernel).
  dps:
    dir: results/baselines/dps
    slug_family: svd
    recon_pattern: "{slug}/recon/{i:05d}.png"
    note: min-max-normalized recon save; SR/motion used a mismatched A (see audit).
  diffpir:
    dir: results/baselines/diffpir
    slug_family: svd
    recon_pattern: "{slug}/recon/{i:05d}.png"
    note: 2x noise, circular convolution.
  fps_smc:
    dir: results/baselines/fps_smc
    slug_family: svd
    recon_pattern: "{slug}/recon/{i:05d}.png"
    note: SVD models motion as Gaussian (operator mismatch on motion).
  psld:
    dir: results/baselines/psld
    slug_family: face
    recon_pattern: "{slug}/{i:05d}/samples/temp_00000.png"        # or 00000.png
    note: OOD FFHQ face prior on ImageNet. Use the non-"_buggy" dirs.
  resample:
    dir: results/baselines/resample
    slug_family: face
    recon_pattern: "{slug}/recon/{i:03d}_recon.png"
    note: OOD FFHQ face prior on ImageNet.

# Canonical precomputed metrics (one ruler, each-vs-own-GT). compare_baselines.py reads this.
metric_csv: results/metrics/previous_baseline_metric_comparison.csv
metric_summary: results/metrics/previous_baseline_metric_summary.md
