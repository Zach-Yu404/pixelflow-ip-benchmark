# --- runtime -----------------------------------------------------------------
python_bin:               ~/anaconda3/envs/pixelflow/bin/python   # ~ expands (local_paths.py / _common.sh)
conda_env:                pixelflow
default_gpu:              0          # CBIG cluster: GPU index inside your allocation (Slurm)
batch_size:               8          # MUST stay 8 — sets the per-image seed stream
seed:                     42         # all-seeds-42 policy (rerun_imageNet/seeding.py)
