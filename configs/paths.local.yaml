# =============================================================================
# paths.local.yaml — SINGLE SOURCE OF TRUTH for all absolute / machine-specific
# paths used by this local reproduction project.
#
# WHY THIS FILE EXISTS
#   The benchmark is reproduced by *reusing* the already-validated code that
#   lives in the original IP_package (the sampler, operators, metrics, runner).
#   To keep the local project clean for a future official release, every
#   absolute path is centralized HERE — NOT scattered through the code. The
#   benchmark/ scripts read this file, add the original code dirs to sys.path,
#   and call the verified functions. Swap this one file to port to a new box.
#
# MIGRATION NOTE (2026-07): moved from the old box to the CBIG cluster.
#   /home/nvidia/Zach/MSFlow  -> /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow
#   /data/Zach_dataset        -> /sfs/ceph/standard/CBIG-Standard-ECE/Zach_dataset/Zach_dataset
#   c2img weights now live in PixelFlow/pretrained_models/ (IP_package copy not migrated).
#   The MRI prior (exp0003/model_epoch40.pt) was RESTORED — see checkpoints/mri/.
#
# DO NOT hard-code any of these paths inside src/ or benchmark/*.py.
# =============================================================================

# --- this project ------------------------------------------------------------
project_root: /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/github_project_local

# --- original code we REUSE (read-only; never modified by this project) ------
# runner.py / operators.py / metrics.py / seeding.py live in original_rerun_imagenet;
# the sampler (ms_posterior_sampling_*) and pixelflow package live in original_ip_package.
original_ip_package:      /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/PixelFlow/IP_package
original_rerun_imagenet:  /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/PixelFlow/IP_package/rerun_imageNet
original_baselines:       /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/PixelFlow/IP_package/baselines
# DAPS forward operators (motionblur.Kernel) — operator alignment references this.
daps_repo:                /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/PixelFlow/IP_package/baselines/DAPS

# --- checkpoint (symlinked into checkpoints/ours/) ---------------------------
checkpoint_root:          /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/github_project_local/checkpoints/ours
# model_dir is what runner.py loads (config.yaml + model.pt). Point at our local
# symlink dir so the project is self-describing; resolves to
# PixelFlow/pretrained_models/c2img (the IP_package copy was not migrated).
model_dir:                /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/github_project_local/checkpoints/ours

# --- data --------------------------------------------------------------------
# Prebuilt evaluation groups (center_crop_arr GTs + inpainting masks). group_100
# is DAPS's exact 100 ImageNet-val images (ILSVRC2012_val_00049000..49099).
groups_dir:               /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/PixelFlow/IP_package/rerun_imageNet/groups
daps_group_id:            100
# Raw ImageNet-val (only needed to REBUILD groups from scratch; not for repro).
imagenet_val_dir:         /sfs/ceph/standard/CBIG-Standard-ECE/Zach_dataset/Zach_dataset/imageNet256/ILSVRC/Data/CLS-LOC/val
imagenet_val_solution:    /sfs/ceph/standard/CBIG-Standard-ECE/Zach_dataset/Zach_dataset/imageNet256/LOC_val_solution.csv
imagenet_synset_mapping:  /sfs/ceph/standard/CBIG-Standard-ECE/Zach_dataset/Zach_dataset/imageNet256/LOC_synset_mapping.txt

# --- previous (reference) results we reproduce against -----------------------
previous_results_root:    /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/github_project_local/results/previous_results
previous_ours_rerun:      /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/github_project_local/results/previous_results/ours_rerun_best
previous_ours_demorunner: /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/github_project_local/results/previous_results/ours_demorunner
baselines_results_root:   /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/github_project_local/results/baselines

# --- output roots (created by this project; safe to delete & regenerate) -----
output_root:              /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/github_project_local/results/reproduced_results
metrics_root:             /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/github_project_local/results/metrics
figures_root:             /sfs/ceph/standard/CBIG-Standard-ECE/Zach/MSFlow/github_project_local/results/figures

